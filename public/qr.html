<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR 코드 인쇄 · 무엇이든 말해보살</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #f3f4f6;
    color: #1f2937;
    padding: 20px;
  }
  .toolbar {
    max-width: 900px;
    margin: 0 auto 20px;
    background: white;
    padding: 16px 20px;
    border-radius: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .toolbar h1 { font-size: 17px; font-weight: 800; }
  .toolbar p { font-size: 12px; color: #6b7280; margin-top: 2px; }
  .print-btn {
    padding: 10px 22px; background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: white; border: none; border-radius: 10px;
    font-size: 14px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; box-shadow: 0 4px 12px rgba(59,130,246,0.25);
  }

  .sheet {
    max-width: 900px;
    margin: 0 auto;
    background: white;
    padding: 24px;
    border-radius: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }

  .qr-card {
    border: 2px dashed #d1d5db;
    border-radius: 18px;
    padding: 18px 14px;
    text-align: center;
    background: white;
    page-break-inside: avoid;
    position: relative;
    overflow: hidden;
  }
  .qr-card.public {
    background: linear-gradient(135deg, #fff5f5 0%, #fce7f3 100%);
    border-color: #f43f5e;
  }
  .qr-card.public::before {
    content: '복도·공용';
    position: absolute;
    top: 10px; right: 10px;
    background: #f43f5e; color: white;
    padding: 3px 10px; border-radius: 20px;
    font-size: 10px; font-weight: 700;
  }
  .qr-pretitle {
    font-size: 10px;
    font-weight: 700;
    color: #e11d48;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .qr-title {
    font-size: 22px;
    font-weight: 900;
    color: #1a1310;
    margin-bottom: 2px;
    line-height: 1.2;
  }
  .qr-loc {
    font-size: 11px;
    color: #9ca3af;
    margin-bottom: 12px;
  }
  .qr-img-wrap {
    background: white;
    padding: 10px;
    border-radius: 12px;
    display: inline-block;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    margin-bottom: 10px;
    position: relative;
  }
  .qr-img-wrap > img.qr { display: block; width: 200px; height: 200px; }
  .qr-img-wrap > img.face {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 56px; height: 56px;
    border-radius: 50%;
    border: 3px solid white;
    background: white;
    object-fit: cover;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }
  .qr-cta {
    font-size: 12px;
    font-weight: 700;
    color: #4b3a2c;
    line-height: 1.5;
    margin-bottom: 4px;
  }
  .qr-cta strong { color: #e11d48; }
  .qr-footer {
    margin-top: 8px;
    font-size: 9px;
    color: #9ca3af;
    border-top: 1px dashed #e5e7eb;
    padding-top: 8px;
  }
  .qr-url {
    font-family: 'SF Mono', Menlo, monospace;
    font-size: 9px;
    color: #9ca3af;
    word-break: break-all;
    margin-top: 4px;
  }

  @media print {
    body { background: white; padding: 0; }
    .toolbar { display: none; }
    .sheet { box-shadow: none; padding: 0; border-radius: 0; max-width: none; }
    .grid { display: block; }
    .qr-card {
      border: none;
      padding: 30mm 20mm;
      width: 100%;
      min-height: 95vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      page-break-after: always;
      break-after: page;
      page-break-inside: avoid;
    }
    .qr-card.public::before { font-size: 14px; padding: 6px 16px; top: 30mm; right: 30mm; }
    .qr-pretitle { font-size: 18px; margin-bottom: 8px; letter-spacing: 4px; }
    .qr-title { font-size: 64px; margin-bottom: 6px; }
    .qr-loc { font-size: 18px; margin-bottom: 28px; }
    .qr-img-wrap { padding: 18px; border-radius: 18px; margin-bottom: 22px; }
    .qr-img-wrap > img.qr { width: 90mm !important; height: 90mm !important; }
    .qr-img-wrap > img.face {
      width: 24mm !important; height: 24mm !important;
      border-width: 5px !important;
    }
    .qr-cta { font-size: 22px; line-height: 1.7; margin-bottom: 14px; }
    .qr-footer { font-size: 14px; padding-top: 14px; margin-top: 14px; }
    .qr-url { font-size: 12px; margin-top: 6px; }
    @page { size: A4 portrait; margin: 0; }
  }

  @media (max-width: 700px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 460px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <div>
    <h1>🖨️ 자습관 QR 코드 인쇄 시트</h1>
    <p>출력해서 가위로 자른 뒤 자습관 내부 / 복도에 붙여주세요. 공용 QR은 자습관 선택 화면이 먼저 뜹니다.</p>
  </div>
  <button class="print-btn" onclick="window.print()">🖨️ 인쇄하기 (⌘+P)</button>
</div>

<div class="sheet">
  <div class="grid" id="qrGrid"></div>
</div>

<script>
const BASE = 'https://jasup-feedback.web.app/';
const ROOMS = [
  { name: '1관', loc: '2층', url: BASE + '?room=1관' },
  { name: '2관', loc: '3층', url: BASE + '?room=2관' },
  { name: '3관', loc: '4층', url: BASE + '?room=3관' },
  { name: '419관', loc: '4층', url: BASE + '?room=419관' },
  { name: '블랙관', loc: '5층', url: BASE + '?room=블랙관' },
  { name: 'B7', loc: '6층', url: BASE + '?room=B7' },
  { name: 'B8', loc: '6층', url: BASE + '?room=B8' },
  { name: 'B9', loc: '6층', url: BASE + '?room=B9' },
];

const grid = document.getElementById('qrGrid');

// QR 이미지 API (에러 정정 레벨 H = 30% 가림 허용, 얼굴 오버레이용)
function qrSrc(text) {
  return 'https://api.qrserver.com/v1/create-qr-code/?size=600x600&margin=10&ecc=H&data=' + encodeURIComponent(text);
}
const FACE = 'master.png';

// 공용 QR (먼저 배치)
const publicCard = document.createElement('div');
publicCard.className = 'qr-card public';
publicCard.innerHTML = `
  <div class="qr-pretitle">🙏 무엇이든 말해보살</div>
  <div class="qr-title">공용 QR</div>
  <div class="qr-loc">복도 · 정수기 · 화장실 등</div>
  <div class="qr-img-wrap"><img class="qr" src="${qrSrc(BASE)}" alt="공용 QR"><img class="face" src="${FACE}" alt=""></div>
  <div class="qr-cta">자습관 안 어떠세요?<br><strong>아무거나 편하게</strong> 말해주세요</div>
  <div class="qr-footer">종합반 사감장 김어랑</div>
  <div class="qr-url">${BASE}</div>
`;
grid.appendChild(publicCard);

// 자습관별 QR
ROOMS.forEach(room => {
  const card = document.createElement('div');
  card.className = 'qr-card';
  card.innerHTML = `
    <div class="qr-pretitle">🙏 무엇이든 말해보살</div>
    <div class="qr-title">${room.name}</div>
    <div class="qr-loc">${room.loc} · 자습관 내부 부착용</div>
    <div class="qr-img-wrap"><img class="qr" src="${qrSrc(room.url)}" alt="${room.name} QR"><img class="face" src="${FACE}" alt=""></div>
    <div class="qr-cta">${room.name} 어떠세요?<br><strong>참고 있던 거 다</strong> 말해주세요</div>
    <div class="qr-footer">종합반 사감장 김어랑</div>
    <div class="qr-url">?room=${room.name}</div>
  `;
  grid.appendChild(card);
});
</script>
</body>
</html>
