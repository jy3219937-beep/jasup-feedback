<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 로그인 · 무엇이든 말해보살</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #f3f4f6;
  }
  .login-card {
    width: 100%;
    max-width: 380px;
    background: #fff;
    border-radius: 24px;
    padding: 40px 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    color: #1f2937;
  }
  .login-emoji { font-size: 48px; text-align: center; margin-bottom: 8px; }
  .login-title { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 6px; color: #111827; }
  .login-sub { font-size: 13px; text-align: center; color: #6b7280; margin-bottom: 32px; }
  .input-group { margin-bottom: 16px; }
  .input-group label {
    display: block; font-size: 12px; font-weight: 600;
    color: #6b7280; margin-bottom: 6px;
  }
  .input-group input {
    width: 100%; padding: 14px 16px; background: #f9fafb;
    border: 1.5px solid #e5e7eb; border-radius: 12px;
    font-size: 14px; font-family: 'Noto Sans KR', sans-serif;
    outline: none; transition: all 0.2s;
  }
  .input-group input:focus { border-color: #3b82f6; background: #fff; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
  .login-btn {
    width: 100%; padding: 15px; background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: white; border: none; border-radius: 12px;
    font-size: 14px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 6px 20px rgba(59,130,246,0.3);
  }
  .login-btn:active { transform: translateY(1px); }
  .err { color: #ef4444; font-size: 12px; margin-top: 6px; min-height: 16px; }
</style>
</head>
<body>
  <div class="login-card">
    <div class="login-emoji">🔐</div>
    <h1 class="login-title">관리자 로그인</h1>
    <p class="login-sub">무엇이든 말해보살 · 종합반</p>
    <form id="loginForm">
      <div class="input-group">
        <label>아이디</label>
        <input type="text" id="userId" autocomplete="username" required autofocus>
      </div>
      <div class="input-group">
        <label>비밀번호</label>
        <input type="password" id="userPw" autocomplete="current-password" required>
      </div>
      <div class="err" id="errMsg"></div>
      <button type="submit" class="login-btn">로그인</button>
    </form>
  </div>
<script>
  const ID = 'admin';
  const PW = 'admin1234';
  document.getElementById('loginForm').addEventListener('submit', e => {
    e.preventDefault();
    const id = document.getElementById('userId').value.trim();
    const pw = document.getElementById('userPw').value;
    if (id === ID && pw === PW) {
      sessionStorage.setItem('jasupFeedback_auth', '1');
      sessionStorage.setItem('jasupFeedback_loginAt', Date.now().toString());
      location.href = 'admin.html';
    } else {
      document.getElementById('errMsg').textContent = '아이디나 비밀번호가 맞지 않아요';
    }
  });
  if (sessionStorage.getItem('jasupFeedback_auth') === '1') location.href = 'admin.html';
</script>
</body>
</html>
